<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="page" ng-controller="PageController">

    <head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="view.js"></script>
        <meta name="platform-links" category="ng-view">
		<script type="text/javascript" src="/services/web/dashboard/services/entity.js"></script>
        <script type="text/javascript" src="controller.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-scrollbar class="bk-full-height">
            <bk-fieldset class="fd-padding-begin-end--sm" ng-form="forms.details">
                <bk-form-group label="{{formHeaders[action]}}" name="entityForm" transclude-classes="fd-container fd-form-layout-grid-container">
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idName" ng-required="true" colon="true">{{ 'codbex-contracts:codbex-contracts-model.t.EMPLOYEECONTRACTITEM_NAME' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col  fd-col-md--8 ">
							<bk-form-input-message
								state="{{ forms.details['Name'].$valid ? '' : 'error' }}"
								text="{{ 'codbex-contracts:codbex-contracts-model.messages.error.lengthMax' | t:{'max':'100.0'} }}">
								<bk-input id="idName"
	                                name="Name"
	                                state="{{ forms.details['Name'].$valid ? '' : 'error' }}"
									ng-required="true"
	                                ng-model="entity.Name"
	                                ng-readonly="action === 'select'"
									ng-maxlength="100.0"
	                                type="text"
	                                placeholder="{{ 'codbex-contracts:codbex-contracts-model.messages.inputEnter' | t:{'name':'$t(codbex-contracts:codbex-contracts-model.t.EMPLOYEECONTRACTITEM_NAME)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idDocument" ng-required="false" colon="true">{{ 'codbex-contracts:codbex-contracts-model.t.EMPLOYEECONTRACTITEM_DOCUMENT' | t }}</bk-form-label>
                        </div>
						<div ng-show="action === 'select'" style="margin: 4px 0px; padding: 0px 10px" class="fd-col  fd-col-md--8 ">
							<bk-link href="{{entity.Document}}" target="_blank">{{entity.Document}}</bk-link>
						</div>
                        <div ng-show="action !== 'select'" class="fd-col  fd-col-md--8 ">
							<bk-form-input-message
								state="{{ forms.details['Document'].$valid ? '' : 'error' }}"
								text="{{ 'codbex-contracts:codbex-contracts-model.messages.error.lengthMax' | t:{'max':'500.0'} }}">
								<bk-input id="idDocument"
	                                name="Document"
	                                state="{{ forms.details['Document'].$valid ? '' : 'error' }}"
									ng-required="false"
	                                ng-model="entity.Document"
	                                ng-readonly="action === 'select'"
									ng-maxlength="500.0"
	                                type="url"
	                                placeholder="{{ 'codbex-contracts:codbex-contracts-model.messages.inputEnter' | t:{'name':'$t(codbex-contracts:codbex-contracts-model.t.EMPLOYEECONTRACTITEM_DOCUMENT)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                </bk-form-group>
            </bk-fieldset>
        </bk-scrollbar>

		<bk-bar bar-design="footer" compact="true" ng-show="action !== 'select'">
			<bk-bar-right>
				<bk-bar-element>
					<bk-button ng-if="action === 'create'" label="{{'codbex-contracts:codbex-contracts-model.defaults.create' | t}}" state="emphasized" ng-click="create()" ng-disabled="!forms.details.$valid"></bk-button>
					<bk-button ng-if="action !== 'create'" label="{{'codbex-contracts:codbex-contracts-model.defaults.update' | t}}" state="emphasized" ng-click="update()" ng-disabled="!forms.details.$valid"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-contracts:codbex-contracts-model.defaults.cancel' | t }}" ng-click="cancel()"></bk-button>
				</bk-bar-element>
			</bk-bar-right>
		</bk-bar>
		<theme></theme>
    </body>

</html>
